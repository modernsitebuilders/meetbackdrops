name: Submit URLs to IndexNow

# IndexNow is for announcing *new/changed* URLs — not bulk-resubmitting the whole
# site every day. Bing Webmaster Tools flags the latter as "IndexNow Batch Mode …
# excessive server load and potential indexing delays". So instead of a daily
# full sweep, we submit only the pages an add-images batch published:
#
#   - run-batch.sh writes image-pipeline/last-batch-urls.txt (this batch's pages)
#   - the push that ships the batch changes that file → this workflow fires and
#     submits exactly those URLs via `submit-indexnow.js --urls-file`.
#
# Manual "Run workflow" (workflow_dispatch) does a full sitemap sweep — use it
# after adding a page that isn't part of an image batch (blog post, new
# top-level page, a manually scaffolded category).
#
# Runs the dependency-free CLI (scripts/submit-indexnow.js) against what's
# committed on main (= deployed). No npm install, no Vercel cron (Hobby plan),
# no secrets.

on:
  push:
    branches: [main]
    paths:
      - 'image-pipeline/last-batch-urls.txt'
  workflow_dispatch: {}

# Don't pile up overlapping runs.
concurrency:
  group: submit-indexnow
  cancel-in-progress: false

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Push that shipped a batch → submit just that batch's pages.
      - name: Submit batch URLs to IndexNow
        if: github.event_name == 'push'
        run: node scripts/submit-indexnow.js --urls-file image-pipeline/last-batch-urls.txt

      # Manual trigger → full sitemap sweep (for non-batch pages).
      - name: Full sitemap sweep to IndexNow (manual)
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/submit-indexnow.js
